<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exercise 16</title>

<style>
body{
    background-color: #eeeeee;
    padding: 40px;
    font-family: "Times New Roman", serif;
}

/* 共用設定 */
.box{
    font-size: 48px;
    font-weight: bold;
    padding: 20px;
    margin: 30px auto;   /* 上下間距 + 置中 */
    width: 500px;        /* ⭐ 控制長度 */
}

/* 第一個：淡藍 + 橘色雙框 */
.box1{
    background-color: #9fb8c5;
    border: 10px double #ff6a3d;
}

/* 第二個：黃色 + 藍色圓角框 */
.box2{
    background-color: yellow;
    border: 4px solid #4a7bd1;
    border-radius: 20px;
}

/* 第三個：綠色 + 點點框 */
.box3{
    background-color: #6fa87c;
    border: 8px dotted gray;
}
</style>

</head>

<body>

<div class="box box1">Hello World</div>

<div class="box box2">Hello World</div>

<div class="box box3">Hello World</div>

</body>
</html>
