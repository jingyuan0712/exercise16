<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Exercise</title>

<style>
body{
    background-color: #f0f0f0;
    padding: 30px;
    font-family: serif;
}


.box1{
    background-color: #9fb8c5;
    border: 5px double orange;
    padding: 15px;
    margin-bottom: 20px;
    font-size: 40px;
    font-weight: bold;
}


.box2{
    background-color: yellow;
    border: 3px solid blue;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 20px;
    font-size: 40px;
    font-weight: bold;
}


.box3{
    background-color: #6fa87c;
    border: 5px dotted gray;
    padding: 15px;
    font-size: 40px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="box1">Hello World</div>

<div class="box2">Hello World</div>

<div class="box3">Hello World</div>

</body>
</html>
